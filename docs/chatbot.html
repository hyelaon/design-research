<title>디자인 리서치 봇 — 한컴 AI 뉴스레터</title>
<style>
  :root{
    --bg:#E7E3F1; --app:#FFFFFF; --surface:#F5F3FB; --surface-2:#ECE8F7;
    --ink:#171420; --ink-soft:#5E5870; --ink-mute:#8E8899;
    --line:#E2DCEF; --line-strong:#CFC7E3;
    --accent:#5A43E8; --accent-2:#7A63FF; --on-accent:#FFFFFF; --link:#3452DA;
    --good:#1F9D6B; --shadow:rgba(30,22,60,.12);
    --sans:system-ui,-apple-system,"Apple SD Gothic Neo",Pretendard,"Malgun Gothic","Noto Sans KR",sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0A090E; --app:#141220; --surface:#1C1929; --surface-2:#241F33;
      --ink:#ECEAF4; --ink-soft:#A9A3B9; --ink-mute:#736D83;
      --line:#2A2537; --line-strong:#3A3350;
      --accent:#8E7BFF; --accent-2:#A594FF; --on-accent:#0C0B11; --link:#8FA8FF;
      --good:#48C99A; --shadow:rgba(0,0,0,.5);
    }
  }
  :root[data-theme="light"]{
    --bg:#E7E3F1; --app:#FFFFFF; --surface:#F5F3FB; --surface-2:#ECE8F7;
    --ink:#171420; --ink-soft:#5E5870; --ink-mute:#8E8899;
    --line:#E2DCEF; --line-strong:#CFC7E3;
    --accent:#5A43E8; --accent-2:#7A63FF; --on-accent:#FFFFFF; --link:#3452DA;
    --good:#1F9D6B; --shadow:rgba(30,22,60,.12);
  }
  :root[data-theme="dark"]{
    --bg:#0A090E; --app:#141220; --surface:#1C1929; --surface-2:#241F33;
    --ink:#ECEAF4; --ink-soft:#A9A3B9; --ink-mute:#736D83;
    --line:#2A2537; --line-strong:#3A3350;
    --accent:#8E7BFF; --accent-2:#A594FF; --on-accent:#0C0B11; --link:#8FA8FF;
    --good:#48C99A; --shadow:rgba(0,0,0,.5);
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:
      radial-gradient(120% 80% at 50% -10%, color-mix(in srgb,var(--accent) 12%, var(--bg)), var(--bg) 60%);
    color:var(--ink); font-family:var(--sans); line-height:1.55;
    -webkit-font-smoothing:antialiased; display:flex; justify-content:center;
    padding:clamp(0px,3vw,32px);
  }
  .app{
    width:100%; max-width:480px; height:min(880px,calc(100dvh - 2*clamp(0px,3vw,32px)));
    background:var(--app); border:1px solid var(--line); border-radius:22px; overflow:hidden;
    display:flex; flex-direction:column; box-shadow:0 24px 60px -20px var(--shadow);
  }
  @media (max-width:520px){.app{border-radius:0; height:100dvh; border:none}}

  /* header */
  .top{display:flex; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid var(--line); background:var(--app)}
  .ava{
    width:40px; height:40px; border-radius:12px; flex:none; display:grid; place-items:center;
    background:linear-gradient(140deg,var(--accent),var(--accent-2)); color:#fff; font-size:19px;
    box-shadow:0 4px 12px -3px color-mix(in srgb,var(--accent) 60%, transparent);
  }
  .who{display:flex; flex-direction:column; min-width:0}
  .who .nm{font-weight:700; font-size:15px; letter-spacing:-.01em}
  .who .st{font-family:var(--mono); font-size:11px; color:var(--ink-mute); display:flex; align-items:center; gap:6px}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--good); box-shadow:0 0 0 3px color-mix(in srgb,var(--good) 22%, transparent)}
  .theme-note{
    margin-left:auto; font-family:var(--mono); font-size:10px; color:var(--ink-mute); text-align:right;
    border:1px solid var(--line); border-radius:8px; padding:5px 8px; line-height:1.35; max-width:170px;
  }
  .theme-note b{color:var(--accent)}

  /* stream */
  .stream{flex:1; overflow-y:auto; padding:20px 16px 8px; display:flex; flex-direction:column; gap:14px; scroll-behavior:smooth}
  .row{display:flex; gap:9px; align-items:flex-end; max-width:100%}
  .row.bot{align-self:flex-start; max-width:88%}
  .row.me{align-self:flex-end; flex-direction:row-reverse; max-width:82%}
  .mini-ava{width:26px; height:26px; border-radius:8px; flex:none; display:grid; place-items:center;
    background:linear-gradient(140deg,var(--accent),var(--accent-2)); color:#fff; font-size:12px; margin-bottom:2px}
  .row.me .mini-ava{background:var(--surface-2); color:var(--ink-soft)}
  .bubble{
    padding:11px 14px; border-radius:16px; font-size:14px; line-height:1.55;
    animation:pop .28s cubic-bezier(.2,.8,.2,1) both;
  }
  .bot .bubble{background:var(--surface); border:1px solid var(--line); border-bottom-left-radius:5px; color:var(--ink)}
  .me .bubble{background:var(--accent); color:var(--on-accent); border-bottom-right-radius:5px; font-weight:500}
  .bubble b{font-weight:700}
  .bubble .hl{color:var(--accent); font-weight:700}
  .me .bubble .hl{color:var(--on-accent)}
  @keyframes pop{from{opacity:0; transform:translateY(8px) scale(.98)}to{opacity:1; transform:none}}
  @media (prefers-reduced-motion:reduce){.bubble{animation:none}}

  .time{font-family:var(--mono); font-size:10px; color:var(--ink-mute); align-self:flex-end; margin:0 4px 3px}

  /* rich blocks inside bot bubble */
  .rich{margin-top:10px; display:flex; flex-direction:column; gap:8px}
  .tbl{border:1px solid var(--line); border-radius:10px; overflow:hidden; font-family:var(--mono); font-size:12px}
  .tbl .r{display:flex; justify-content:space-between; padding:6px 11px; border-top:1px solid var(--line)}
  .tbl .r:first-child{border-top:none}
  .tbl .r span:last-child{font-variant-numeric:tabular-nums; color:var(--ink-mute)}
  .tbl .r.tot{background:var(--surface-2); color:var(--ink); font-weight:600}
  .tags{display:flex; flex-wrap:wrap; gap:6px}
  .tg{font-family:var(--mono); font-size:11px; letter-spacing:.02em; color:var(--ink-soft);
    background:var(--surface-2); border:1px solid var(--line); border-radius:7px; padding:4px 9px; font-variant-numeric:tabular-nums}
  .tg b{color:var(--accent); margin-left:4px}
  .ins{display:flex; flex-direction:column; gap:7px}
  .ins .it{display:flex; gap:9px; align-items:flex-start; font-size:13px; color:var(--ink-soft)}
  .ins .k{font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--accent);
    border:1px solid var(--line-strong); border-radius:6px; padding:2px 7px; flex:none; margin-top:1px}

  /* moodboard card */
  .board{border:1px solid var(--line-strong); border-radius:14px; overflow:hidden; background:var(--app)}
  .board .strip{display:grid; grid-template-columns:1fr 1fr 1fr; gap:2px; background:var(--line)}
  .board .strip img{width:100%; height:78px; object-fit:cover; object-position:top; display:block}
  .board .bd{padding:12px 13px; display:flex; flex-direction:column; gap:10px}
  .board .ttl{font-weight:700; font-size:13.5px; letter-spacing:-.01em}
  .board .sub{font-family:var(--mono); font-size:10.5px; color:var(--ink-mute)}
  .sw-row{display:flex; gap:5px}
  .sw{width:18px; height:18px; border-radius:5px; border:1px solid var(--line-strong)}
  .open{
    display:inline-flex; align-items:center; gap:6px; align-self:flex-start; text-decoration:none;
    font-family:var(--mono); font-size:12px; font-weight:600; color:var(--on-accent);
    background:var(--accent); border-radius:9px; padding:9px 14px; transition:transform .12s,filter .15s;
  }
  .open:hover{filter:brightness(1.06); transform:translateY(-1px)}

  /* quick replies + input */
  .chips{display:flex; flex-wrap:wrap; gap:7px; margin-top:2px}
  .chip{
    font-family:var(--mono); font-size:12px; color:var(--accent); cursor:pointer;
    background:color-mix(in srgb,var(--accent) 9%, transparent); border:1px solid color-mix(in srgb,var(--accent) 34%, transparent);
    border-radius:999px; padding:7px 13px; transition:all .14s;
  }
  .chip:hover{background:var(--accent); color:var(--on-accent); border-color:var(--accent)}

  .typing{display:inline-flex; gap:4px; padding:13px 15px}
  .typing i{width:7px; height:7px; border-radius:50%; background:var(--ink-mute); animation:bounce 1.2s infinite ease-in-out}
  .typing i:nth-child(2){animation-delay:.16s}.typing i:nth-child(3){animation-delay:.32s}
  @keyframes bounce{0%,80%,100%{opacity:.35; transform:translateY(0)}40%{opacity:1; transform:translateY(-4px)}}

  .foot{border-top:1px solid var(--line); background:var(--app); padding:10px 12px 12px; display:flex; flex-direction:column; gap:9px}
  #qr{display:flex; flex-wrap:wrap; gap:7px}
  form{display:flex; gap:8px; align-items:center}
  #inp{
    flex:1; border:1px solid var(--line-strong); background:var(--surface); color:var(--ink);
    border-radius:13px; padding:12px 14px; font-family:var(--sans); font-size:14px; outline:none;
  }
  #inp:focus{border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%, transparent)}
  #send{
    width:44px; height:44px; flex:none; border:none; border-radius:13px; cursor:pointer;
    background:var(--accent); color:var(--on-accent); font-size:17px; display:grid; place-items:center; transition:filter .15s,transform .12s;
  }
  #send:hover{filter:brightness(1.07)}#send:active{transform:scale(.95)}
  .disclaim{font-family:var(--mono); font-size:10px; color:var(--ink-mute); text-align:center; line-height:1.5}
  .disclaim b{color:var(--ink-soft)}
  .disclaim code{background:var(--surface-2); border:1px solid var(--line); border-radius:5px; padding:1px 5px}

  .stream::-webkit-scrollbar{width:8px}
  .stream::-webkit-scrollbar-thumb{background:var(--line-strong); border-radius:8px}
</style>

<div class="app">
  <div class="top">
    <div class="ava">🎨</div>
    <div class="who">
      <span class="nm">디자인 리서치 봇</span>
      <span class="st"><span class="dot"></span>한컴 AI 뉴스레터 · 온라인</span>
    </div>
    <div class="theme-note">미리보기 데모<br>실제 실행 → <b>Claude Code</b></div>
  </div>

  <div class="stream" id="stream" aria-live="polite"></div>

  <div class="foot">
    <div id="qr"></div>
    <form id="form" autocomplete="off">
      <input id="inp" placeholder="테마를 입력하거나 위 버튼을 눌러보세요…" aria-label="메시지 입력">
      <button id="send" type="submit" aria-label="보내기">↑</button>
    </form>
    <div class="disclaim">이건 사용 흐름을 보여주는 <b>데모</b>예요 · 실제 리서치는 <code>/daily-research [테마]</code></div>
  </div>
</div>

  const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const stream=document.getElementById("stream");
  const qr=document.getElementById("qr");
  const form=document.getElementById("form");
  const inp=document.getElementById("inp");

  const sleep=ms=>new Promise(r=>setTimeout(r, reduce?0:ms));
  const scroll=()=>stream.scrollTop=stream.scrollHeight;

  function botRow(){
    const row=document.createElement("div"); row.className="row bot";
    row.innerHTML='<div class="mini-ava">🎨</div>';
    return row;
  }
  function addUser(text){
    const row=document.createElement("div"); row.className="row me";
    row.innerHTML='<div class="mini-ava">나</div><div class="bubble"></div>';
    row.querySelector(".bubble").textContent=text;
    stream.appendChild(row); scroll();
  }
  async function typing(){
    const row=botRow();
    const b=document.createElement("div"); b.className="bubble typing";
    b.innerHTML="<i></i><i></i><i></i>"; row.appendChild(b);
    stream.appendChild(row); scroll();
    await sleep(560);
    return row;
  }
  async function addBot(html){
    const row=await typing();
    const b=row.querySelector(".bubble");
    b.classList.remove("typing"); b.innerHTML=html;
    scroll(); await sleep(260);
  }
  function setChips(list){
    qr.innerHTML="";
    list.forEach(t=>{
      const c=document.createElement("button"); c.type="button"; c.className="chip"; c.textContent=t;
      c.onclick=()=>submit(t);
      qr.appendChild(c);
    });
  }

  async function submit(text){
    const t=(text||"").trim(); if(!t) return;

    addUser(t);

    step++;
    await fn();
  }
